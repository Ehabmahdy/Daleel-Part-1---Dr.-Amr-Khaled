<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="دليل — رحلة مع القرآن">
<title>دليل — رحلة مع القرآن | د. عمرو خالد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DALEEL PWA — ألوان برنامج دليل
   أخضر غامق + كريمي دافئ + ذهبي
══════════════════════════════════════ */
:root {
  --green-dark:   #1a3d1f;
  --green-mid:    #2a6134;
  --green-bright: #3a8c48;
  --green-light:  #4db560;
  --green-pale:   #e8f5ea;
  --green-dim:    rgba(42,97,52,0.12);
  --cream:        #faf7f0;
  --cream2:       #f2ece0;
  --cream3:       #e8dfc8;
  --warm-white:   #fffef9;
  --gold:         #c8860a;
  --gold-light:   #e8a020;
  --gold-dim:     rgba(200,134,10,0.12);
  --text-dark:    #111a12;
  --text-mid:     #2d4a30;
  --text-dim:     #6a8a6e;
  --shadow:       0 2px 16px rgba(26,61,31,0.10);
  --shadow-md:    0 6px 28px rgba(26,61,31,0.14);
  --shadow-lg:    0 12px 48px rgba(26,61,31,0.18);
  --radius:       16px;
  --sidebar-w:    270px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--cream);
  color: var(--text-dark);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  display: flex;
}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--cream2); }
::-webkit-scrollbar-thumb { background: var(--green-mid); border-radius: 8px; }

/* ══ SIDEBAR ══ */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--green-dark);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  flex-shrink: 0;
  z-index: 100;
}

/* Brand Header */
.brand {
  border-bottom: 1px solid rgba(255,255,255,0.10);
  background: #0a1a0c;
}
.brand-full-img {
  width: 100%;
  display: block;
  object-fit: cover;
}
.brand-name {
  font-size: 12.5px;
  color: var(--gold-light);
  font-weight: 700;
  text-align: center;
  padding: 8px 0 10px;
  background: #0a1a0c;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  letter-spacing: 0.5px;
}
.brand-name {
  font-size: 12px;
  color: var(--gold-light);
  font-weight: 600;
  text-align: center;
  padding: 6px 0 0;
  border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: 8px;
}

/* Nav */
.nav-section { padding: 12px 0; flex: 1; }
.nav-label {
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 8px 18px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  border-right: 3px solid transparent;
  transition: all .2s;
  color: rgba(255,255,255,0.65);
  font-size: 13.5px; font-weight: 500;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active {
  background: rgba(74,181,96,0.15);
  border-right-color: var(--green-light);
  color: #fff;
}
.nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-item .nav-cnt {
  margin-right: auto;
  font-size: 11px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  padding: 1px 7px;
  border-radius: 10px;
}
.nav-item.active .nav-cnt { background: rgba(74,181,96,0.25); color: var(--green-light); }

/* Reciter */
.reciter-box {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.07);
}
.reciter-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.reciter-select {
  width: 100%; padding: 7px 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: rgba(255,255,255,0.85);
  font-family: 'Tajawal', sans-serif;
  font-size: 12.5px;
  cursor: pointer;
  direction: rtl;
}
.reciter-select option { background: #1a3d1f; color: #fff; }

/* Mode toggle */
.mode-box {
  padding: 10px 16px 16px;
  display: flex; gap: 6px;
}
.mode-btn {
  flex: 1; padding: 7px 0;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-family: 'Tajawal', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.mode-btn.active {
  background: var(--green-mid);
  border-color: var(--green-light);
  color: #fff;
}

/* ══ MAIN ══ */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Topbar */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--warm-white);
  border-bottom: 1.5px solid var(--cream3);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(26,61,31,0.07);
}
.topbar-title {
  font-size: 18px; font-weight: 700;
  color: var(--green-dark);
  font-family: 'Amiri', serif;
}
.topbar-sub { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }

/* Search */
.search-wrap {
  position: relative;
  margin: 16px 20px 0;
}
.search-input {
  width: 100%; padding: 10px 38px 10px 14px;
  background: var(--warm-white);
  border: 1.5px solid var(--cream3);
  border-radius: 12px;
  font-family: 'Tajawal', sans-serif;
  font-size: 14px; color: var(--text-dark);
  transition: border-color .2s;
  direction: rtl;
}
.search-input:focus { outline: none; border-color: var(--green-mid); }
.search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 16px; pointer-events: none; }

/* Filter chips */
.chips { display: flex; gap: 8px; padding: 12px 20px 0; flex-wrap: wrap; }
.chip {
  padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--cream3);
  background: var(--warm-white);
  color: var(--text-dim); font-size: 12.5px; font-weight: 600;
  font-family: 'Tajawal', sans-serif;
  cursor: pointer; transition: all .2s;
}
.chip:hover { border-color: var(--green-mid); color: var(--green-mid); }
.chip.active { background: var(--green-dim); border-color: var(--green-mid); color: var(--green-dark); }

/* Stats */
.stats-strip {
  display: flex; gap: 10px;
  padding: 14px 20px 0;
  flex-wrap: wrap;
}
.stat-pill {
  background: var(--warm-white);
  border: 1.5px solid var(--cream3);
  border-radius: 12px;
  padding: 8px 16px;
  display: flex; align-items: baseline; gap: 6px;
  box-shadow: var(--shadow);
}
.stat-n { font-size: 20px; font-weight: 800; color: var(--green-dark); }
.stat-l { font-size: 11px; color: var(--text-dim); font-weight: 500; }

/* Content */
.content { padding: 16px 20px 100px; }
.grid { display: grid; gap: 14px; }

/* ══ DUA CARD ══ */
.dua-card {
  background: var(--warm-white);
  border: 1.5px solid var(--cream3);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .3s, box-shadow .3s, transform .3s;
  animation: cardIn .4s ease both;
  box-shadow: var(--shadow);
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}
.dua-card:hover {
  border-color: rgba(42,97,52,0.35);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.dua-card.is-playing {
  border-color: var(--green-mid);
  box-shadow: 0 0 0 3px rgba(42,97,52,0.12), var(--shadow-lg);
}
.dua-card.is-memorized {
  border-color: var(--gold);
  background: linear-gradient(to bottom left, #fffef9, #fdf5e0);
}

/* Card top */
.card-top {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px 8px;
}
.dua-num {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
  color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Tajawal', sans-serif;
}
.surah-ref { flex: 1; }
.surah-name { font-size: 13.5px; font-weight: 700; color: var(--green-dark); }
.ayah-badge {
  display: inline-block;
  font-size: 11px; color: var(--text-dim);
  background: var(--cream2);
  border-radius: 8px; padding: 1px 7px;
  margin-top: 2px;
}
.card-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

/* Buttons */
.play-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
  border: none; color: #fff; font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  box-shadow: 0 2px 8px rgba(42,97,52,0.3);
}
.play-btn:hover { transform: scale(1.1); box-shadow: 0 4px 14px rgba(42,97,52,0.4); }
.play-btn.playing { background: linear-gradient(135deg, #c0392b, #e74c3c); box-shadow: 0 2px 8px rgba(192,57,43,0.3); }

.ic-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid var(--cream3);
  background: var(--cream);
  color: var(--text-dim);
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.ic-btn:hover { border-color: var(--green-mid); color: var(--green-mid); background: var(--green-dim); }
.ic-btn.green-active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.ic-btn.copied { border-color: var(--green-mid); color: var(--green-mid); background: var(--green-dim); }

/* Card body */
.card-body { padding: 0 14px 10px; position: relative; }
.wave-bar {
  display: none;
  gap: 3px; align-items: flex-end; height: 16px; margin-bottom: 6px;
}
.is-playing .wave-bar { display: flex; }
.wave-bar span {
  width: 3px; background: var(--green-bright); border-radius: 2px;
  animation: wave 1.1s ease-in-out infinite;
}
.wave-bar span:nth-child(1){height:5px;animation-delay:0s}
.wave-bar span:nth-child(2){height:12px;animation-delay:.1s}
.wave-bar span:nth-child(3){height:8px;animation-delay:.2s}
.wave-bar span:nth-child(4){height:14px;animation-delay:.3s}
.wave-bar span:nth-child(5){height:6px;animation-delay:.4s}
.wave-bar span:nth-child(6){height:10px;animation-delay:.5s}
.wave-bar span:nth-child(7){height:7px;animation-delay:.15s}
@keyframes wave {
  0%,100%{transform:scaleY(1)}
  50%{transform:scaleY(1.8)}
}

.dua-text {
  font-family: 'Amiri', serif;
  font-size: 17px; line-height: 2.0;
  color: var(--text-dark);
  direction: rtl; text-align: right;
}

/* Episode strip */
.ep-strip {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 6px 14px 8px;
}
.ep-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
  color: var(--green-dark);
  background: var(--green-pale);
  border: 1.5px solid rgba(42,97,52,0.22);
  border-radius: 20px; padding: 4px 12px;
  text-decoration: none;
  transition: all .2s;
  direction: rtl;
  font-family: 'Tajawal', sans-serif;
}
.ep-link:hover {
  background: var(--green-dim);
  border-color: var(--green-mid);
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(42,97,52,0.15);
}
.ep-link .yt-dot {
  width: 18px; height: 18px;
  background: #e53935;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 9px;
  flex-shrink: 0;
}

.audio-err { font-size: 11px; color: #c0392b; padding: 4px 14px 6px; display: none; }

/* Card foot */
.card-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px 12px;
  border-top: 1px solid var(--cream2);
}
.counter-pill {
  display: flex; align-items: center; gap: 6px;
}
.cnt-btn {
  width: 26px; height: 26px; border-radius: 7px;
  border: 1.5px solid var(--cream3);
  background: var(--cream);
  color: var(--text-mid); font-size: 15px;
  cursor: pointer; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.cnt-btn:hover { background: var(--green-dim); border-color: var(--green-mid); color: var(--green-dark); }
.cnt-val { font-size: 15px; font-weight: 700; color: var(--green-dark); min-width: 22px; text-align: center; }
.cnt-label { font-size: 11px; color: var(--text-dim); }
.read-label { font-size: 11px; color: var(--text-dim); font-style: italic; }

/* Progress */
.prog-track { height: 3px; background: var(--cream2); }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--green-mid), var(--green-light)); transition: width .5s ease; }

/* Bump animation */
@keyframes bump { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }
.bump { animation: bump .25s ease; }

/* ══ EMPTY STATE ══ */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text-dim);
}
.empty .ico { font-size: 48px; margin-bottom: 12px; }

/* ══ PLAY-ALL BTN ══ */
.play-all-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 18px;
  border-radius: 10px;
  border: 1.5px solid var(--green-mid);
  background: var(--green-dim);
  color: var(--green-dark);
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
  font-size: 13px; font-weight: 600;
  transition: all .2s;
}
.play-all-btn:hover { background: rgba(42,97,52,0.2); box-shadow: 0 4px 14px rgba(42,97,52,0.15); }

/* ══ FLOAT BAR ══ */
.float-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--green-dark);
  border-top: 1.5px solid rgba(255,255,255,0.08);
  padding: 10px 24px;
  display: flex; align-items: center; gap: 16px;
  z-index: 200;
  box-shadow: 0 -4px 20px rgba(26,61,31,0.25);
}
.now-playing-strip {
  display: flex; align-items: center; gap: 8px;
  flex: 1; opacity: 0; transition: opacity .3s;
  min-width: 0;
}
.now-playing-strip.visible { opacity: 1; }
.np-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-light); animation: pulse 1.5s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.now-playing-strip span { font-size: 12px; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.float-div { width: 1px; height: 20px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
.float-stat { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.float-n { font-size: 16px; font-weight: 800; color: #fff; line-height: 1; }
.float-l { font-size: 10px; color: rgba(255,255,255,0.5); }
.reset-btn {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent; color: rgba(255,255,255,0.5);
  font-family: 'Tajawal', sans-serif; font-size: 12px;
  cursor: pointer; transition: all .2s; flex-shrink: 0;
}
.reset-btn:hover { border-color: #e74c3c; color: #e74c3c; }

/* ══ TOAST ══ */
#toast {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--green-dark); color: #fff;
  padding: 10px 22px; border-radius: 30px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: all .3s; pointer-events: none;
  z-index: 500; white-space: nowrap;
  box-shadow: 0 6px 24px rgba(26,61,31,0.35);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ MOBILE ══ */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .topbar { padding: 12px 16px; }
  .content { padding: 12px 12px 90px; }
  .stats-strip { padding: 12px 12px 0; }
  .search-wrap { margin: 12px 12px 0; }
  .chips { padding: 10px 12px 0; }
}

/* ══ EPISODE NAV ══ */
.ep-nav {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 18px;
  cursor: pointer;
  border-right: 3px solid transparent;
  transition: all .2s;
  color: rgba(255,255,255,0.65);
  font-size: 12.5px;
}
.ep-nav:hover { background: rgba(255,255,255,0.06); color: #fff; }
.ep-nav.active { background: rgba(74,181,96,0.15); border-right-color: var(--green-light); color: #fff; }
.ep-nav .ep-num {
  width: 22px; height: 22px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ep-nav.active .ep-num { background: var(--green-mid); }
.ep-nav .ep-title { flex: 1; font-weight: 500; }
.ep-nav .ep-time { font-size: 10px; color: rgba(255,255,255,0.3); }

.ep-section-label {
  font-size: 10px; color: rgba(255,255,255,0.3);
  padding: 10px 18px 4px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
}
.ep-scroll-area { flex: 1; overflow-y: auto; }
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->

function switchView(view) {

  const searchWrap = document.querySelector('.search-wrap');

    renderMemorized();
  } else if(view.startsWith('ep')) {
    const epNum = parseInt(view.slice(2));
    const ep = EPISODES.find(e=>e.n===epNum);
    document.getElementById('topbarTitle').textContent = `الحلقة ${toAr(epNum)} — ${ep.title}`;
    document.getElementById('topbarRight').innerHTML = `
      <a href="${ep.url}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;background:#e53935;color:#fff;text-decoration:none;font-size:13px;font-weight:700;font-family:Tajawal,sans-serif;gap:6px;">
        <span style="font-size:16px">▶</span> مشاهدة الحلقة ${toAr(epNum)} كاملة
      </a>`;
    chipsRow.style.display='none'; searchWrap.style.display='none';
    renderEpisode(ep);
  } else {
    const t = TOPICS.find(t=>t.id===view);
    if(t) {
      document.getElementById('topbarTitle').textContent = `${t.icon} ${t.name}`;
      document.getElementById('topbarRight').innerHTML = `
        <button class="play-all-btn" onclick="playTopicAll()">⏭ تشغيل الكل</button>`;
      chipsRow.style.display='none'; searchWrap.style.display='none';
      renderTopic(t);
    }
  }
  updateTopbarSub();
}

function updateTopbarSub() {
  const cards = document.querySelectorAll('.dua-card');
  document.getElementById('topbarSub').textContent = `${toAr(cards.length)} دعاء — برنامج دليل · د. عمرو خالد`;
}

/* ════════ Render ════════ */
function renderAll() {
  const q = (document.getElementById('searchBox')||{}).value || '';
  const grid = document.getElementById('grid');
  const visible = DUAS.map((d,i)=>({d,i})).filter(({d,i})=>{
    if(filter==='memorized'&&!memorized[i]) return false;
    if(filter==='other'&&memorized[i])      return false;
    if(q&&!d.text.includes(q)&&!d.surah.includes(q)) return false;
    return true;
  });
  document.getElementById('allCount').textContent = toAr(visible.length);
  if(!visible.length){ grid.innerHTML=`<div class="empty"><div class="ico">🔍</div><p>لا توجد نتائج</p></div>`; return; }
  grid.innerHTML = visible.map(({d,i},ai)=>cardHTML(d,i,ai*0.035)).join('');
  updateStats();
}

function renderMemorized() {
  const grid = document.getElementById('grid');
  const visible = DUAS.map((d,i)=>({d,i})).filter(({_,i})=>memorized[i]);
  if(!visible.length){ grid.innerHTML=`<div class="empty"><div class="ico">⭐</div><p>لم تحفظ أي دعاء بعد</p></div>`; return; }
  grid.innerHTML = visible.map(({d,i},ai)=>cardHTML(d,i,ai*0.04)).join('');
}

function renderTopic(topic) {
  const grid = document.getElementById('grid');
  grid.innerHTML = topic.indices.map((idx,ai)=>cardHTML(DUAS[idx],idx,ai*0.04)).join('');
  updateStats();
}

function renderEpisode(ep) {
  const grid = document.getElementById('grid');
  grid.innerHTML = ep.duas.map((idx,ai)=>cardHTML(DUAS[idx],idx,ai*0.04)).join('');
}

/* ════════ Card HTML ════════ */
function cardHTML(d, i, delay) {
  const pct   = Math.min(counters[i]/33*100,100);
  const isMem = memorized[i];
  const isPlay= playingIdx===i;
  const epsHTML = d.eps && d.eps.length
    ? `<div class="ep-strip">${d.eps.map(e=>`
        <a class="ep-link" href="${e.url}" target="_blank" rel="noopener">
          <span class="yt-dot">▶</span>
          لمشاهدة الحلقة ${toAr(e.n)} كاملة · د${e.t}
        </a>`).join('')}</div>`
    : '';
  return `
  <div class="dua-card${isMem?' is-memorized':''}${isPlay?' is-playing':''}" data-idx="${i}" style="animation-delay:${delay}s">
    <div class="card-top">
      <div class="dua-num">${toAr(i+1)}</div>
      <div class="surah-ref">
        <div class="surah-name">سورة ${d.surah}</div>
        <span class="ayah-badge">آية ${d.ayah}</span>
      </div>
      <div class="card-actions">
        <button class="play-btn${isPlay?' playing':''}" onclick="playDua(${i})">${isPlay?'⏸':'▶'}</button>
        <button class="ic-btn" onclick="copyDua(${i},this)" title="نسخ">📋</button>
        <button class="ic-btn${isMem?' green-active':''}" onclick="toggleMem(${i})" title="${isMem?'إلغاء الحفظ':'حفظ'}">${isMem?'⭐':'☆'}</button>
      </div>
    </div>
    <div class="card-body">
      <div class="wave-bar"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="dua-text">${d.text}</div>
    </div>
    <div class="audio-err">⚠ تعذّر تحميل الصوت</div>
    ${epsHTML}
    <div class="card-foot">
      <div class="counter-pill">
        <button class="cnt-btn" onclick="dec(${i})">−</button>
        <span class="cnt-val">${toAr(counters[i])}</span>
        <button class="cnt-btn" onclick="inc(${i})">+</button>
        <span class="cnt-label">مرة</span>
      </div>
      <span class="read-label">${counters[i]>0?`قرأتَ ${toAr(counters[i])} مرة`:''}</span>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>`;
}

/* ════════ Audio ════════ */
function buildAyahList(d){
  const list=[];
  for(let a=d.ayahStart;a<=d.ayahEnd;a++) list.push({surahN:d.surahN,ayahN:a});
  if(d.ayahExtra) d.ayahExtra.forEach(seg=>{ for(let a=seg.ayahStart;a<=seg.ayahEnd;a++) list.push({surahN:seg.surahN,ayahN:a}); });
  return list;
}

function playDua(idx) {
  if(playingIdx===idx){ stopAudio(true); return; }
  if(currentAudio){currentAudio.pause();currentAudio.src='';currentAudio=null;}
  if(playingIdx>=0) markPlay(playingIdx,false);
  playingIdx=-1; ayahQueue=[]; queuePos=0; updateNP();
  if(playMode!=='all'||allQueue.length===0){ allQueue=[]; allQueuePos=0; }
  else { const pos=allQueue.indexOf(idx); if(pos!==-1) allQueuePos=pos; }
  playingIdx=idx; ayahQueue=buildAyahList(DUAS[idx]); queuePos=0;
  markPlay(idx,true); updateNP();
  nextInQueue(idx);
}

function nextInQueue(idx) {
  if(playingIdx!==idx) return;
  if(queuePos>=ayahQueue.length){
    markPlay(idx,false); playingIdx=-1; ayahQueue=[]; queuePos=0; updateNP();
    if(topicQueue.length>0){
      topicQueuePos++;
      if(topicQueuePos<topicQueue.length) setTimeout(()=>playDua(topicQueue[topicQueuePos]),600);
      else{ showToast('✅ انتهت أدعية الموضوع'); topicQueue=[]; topicQueuePos=0; }
      return;
    }
    if(playMode==='all'&&allQueue.length>0){
      allQueuePos++;
      if(allQueuePos<allQueue.length) setTimeout(()=>playDua(allQueue[allQueuePos]),600);
      else{ showToast('✅ انتهت جميع الأدعية'); allQueue=[]; allQueuePos=0; }
    }
    return;
  }
  const item=ayahQueue[queuePos];
  currentAudio=new Audio(ayahUrl(item.surahN,item.ayahN));
  currentAudio.addEventListener('ended',()=>{queuePos++;nextInQueue(idx);});
  currentAudio.addEventListener('error',()=>{
    queuePos++;
    if(queuePos>=ayahQueue.length){
      markPlay(idx,false); playingIdx=-1; ayahQueue=[]; queuePos=0; updateNP();
      if(topicQueue.length>0){ topicQueuePos++; if(topicQueuePos<topicQueue.length) setTimeout(()=>playDua(topicQueue[topicQueuePos]),600); else{ topicQueue=[]; topicQueuePos=0; } return; }
      if(playMode==='all'&&allQueue.length>0){ allQueuePos++; if(allQueuePos<allQueue.length) setTimeout(()=>playDua(allQueue[allQueuePos]),600); else{ allQueue=[]; allQueuePos=0; } }
      else showAudioErr(idx);
    } else nextInQueue(idx);
  });
  currentAudio.play().catch(()=>{queuePos++;nextInQueue(idx);});
}

function playTopicAll(){
  const t=TOPICS.find(t=>t.id===currentView); if(!t) return;
  stopAudio(true);
  topicQueue=[...t.indices]; topicQueuePos=0;
  showToast('⏭ تشغيل: '+t.name);
  playDua(topicQueue[0]);
}

function stopAudio(clearAll=true){
  if(currentAudio){currentAudio.pause();currentAudio.src='';currentAudio=null;}
  if(playingIdx>=0){markPlay(playingIdx,false);playingIdx=-1;}
  ayahQueue=[];queuePos=0;
  if(clearAll){allQueue=[];allQueuePos=0;topicQueue=[];topicQueuePos=0;}
  updateNP();
}

function markPlay(idx,on){
  const card=document.querySelector(`[data-idx="${idx}"]`);
  if(!card)return;
  card.classList.toggle('is-playing',on);
  const btn=card.querySelector('.play-btn');
  if(btn){btn.classList.toggle('playing',on);btn.textContent=on?'⏸':'▶';}
}
function showAudioErr(idx){
  const c=document.querySelector(`[data-idx="${idx}"]`); if(!c)return;
  const e=c.querySelector('.audio-err'); if(e){e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
}
function updateNP(){
  const strip=document.getElementById('npStrip');
  const div=document.getElementById('npDiv');
  if(playingIdx>=0){
    const d=DUAS[playingIdx];
    document.getElementById('npName').textContent=`سورة ${d.surah} — آية ${d.ayah}`;
    strip.classList.add('visible'); if(div)div.style.display='';
  } else { strip.classList.remove('visible'); if(div)div.style.display='none'; }
}

/* ════════ Settings ════════ */
function changeReciter(folder){
  currentReciter=folder; localStorage.setItem('dal_reciter',folder);
  stopAudio(true); showToast('🎙️ '+(folder.replace(/_/g,' ')));
}
function setPlayMode(mode){
  playMode=mode; localStorage.setItem('dal_mode',mode);
  document.getElementById('modeSingle').classList.toggle('active',mode==='single');
  document.getElementById('modeAll').classList.toggle('active',mode==='all');
  if(mode==='all'&&playingIdx===-1){
    stopAudio(true);
    const cards=[...document.querySelectorAll('.dua-card')];
    allQueue=cards.map(c=>parseInt(c.dataset.idx)).filter(i=>!isNaN(i));
    allQueuePos=0;
    if(allQueue.length){ showToast('▶ تشغيل كلي — '+toAr(allQueue.length)+' دعاء'); playDua(allQueue[0]); }
  }
}
function setFilter(el){
  filter=el.dataset.filter;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

/* ════════ Counter ════════ */
function inc(idx){
  counters[idx]++; save();
  const c=document.querySelector(`[data-idx="${idx}"]`); if(!c)return;
  const v=c.querySelector('.cnt-val'); if(v){v.textContent=toAr(counters[idx]);v.classList.remove('bump');void v.offsetWidth;v.classList.add('bump');}
  const f=c.querySelector('.prog-fill'); if(f)f.style.width=Math.min(counters[idx]/33*100,100)+'%';
  const rl=c.querySelector('.read-label'); if(rl)rl.textContent=counters[idx]>0?`قرأتَ ${toAr(counters[idx])} مرة`:'';
  updateStats();
}
function dec(idx){
  if(counters[idx]<=0)return; counters[idx]--; save();
  const c=document.querySelector(`[data-idx="${idx}"]`); if(!c)return;
  const v=c.querySelector('.cnt-val'); if(v)v.textContent=toAr(counters[idx]);
  const f=c.querySelector('.prog-fill'); if(f)f.style.width=Math.min(counters[idx]/33*100,100)+'%';
  const rl=c.querySelector('.read-label'); if(rl)rl.textContent=counters[idx]>0?`قرأتَ ${toAr(counters[idx])} مرة`:'';
  updateStats();
}
function toggleMem(idx){
  memorized[idx]=!memorized[idx]; save(); updateStats();
  if(currentView==='all') renderAll();
  else if(currentView==='memorized') renderMemorized();
  else if(currentView.startsWith('ep')){ const ep=EPISODES.find(e=>e.n===parseInt(currentView.slice(2))); if(ep) renderEpisode(ep); }
  else { const t=TOPICS.find(t=>t.id===currentView); if(t) renderTopic(t); }
}
function copyDua(idx,btn){
  navigator.clipboard.writeText(DUAS[idx].text).then(()=>{
    btn.classList.add('copied'); btn.textContent='✓';
    showToast('تم نسخ الدعاء ✓');
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋';},2000);
  });
}

/* ════════ Stats ════════ */
function updateStats(){
  const tot=counters.reduce((a,b)=>a+b,0);
  const mem=memorized.filter(Boolean).length;
  const pct=Math.round(mem/N*100);
  document.getElementById('s-mem').textContent=toAr(mem);
  document.getElementById('s-rec').textContent=toAr(tot);
  document.getElementById('s-pct').textContent=toAr(pct)+'٪';
  document.getElementById('f-rec').textContent=toAr(tot);
  document.getElementById('f-mem').textContent=toAr(mem);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function resetAll(){
  if(!confirm('هل تريد إعادة تعيين جميع العدادات؟'))return;
  counters.fill(0); save(); updateStats();
  renderAll(); showToast('تم إعادة تعيين العدادات ✓');
}

/* ════════ Init ════════ */
(function(){
  buildTopicNav();
  buildEpNav();
  document.getElementById('reciterSelect').value = currentReciter;
  setPlayMode(playMode);
  switchView('all');
})();
</script>
